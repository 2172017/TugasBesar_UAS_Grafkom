<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Simulasi Parkir Mobil 3D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
    }

    .ui {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
    }

    .ui h3 {
      margin: 0 0 6px 0;
      font-size: 16px;
      color: #00ff88;
    }
  </style>
</head>

<body>

  <div class="ui">
    <h3>Game Parkir 3D</h3>
    W : Maju<br>
    S : Mundur<br>
    A : Belok Kiri<br>
    D : Belok Kanan<br>
    Klik + Geser Mouse : Kamera
  </div>

  <!-- THREE.JS APP -->
  <script type="module" src="parking.js"></script>

</body>
</html>
